name: Clean and Upload Playlists

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yadisk requests

      - name: Download all playlists (with existence check)
        run: |
          # Функция для безопасного скачивания
          safe_download() {
            local url="$1"
            local output="$2"
            if curl --head --fail --silent "$url" > /dev/null; then
              curl -L -o "$output" "$url"
              echo "✅ Скачан: $output"
            else
              echo "⚠️ Файл не найден (404): $url — пропускаем"
            fi
          }

          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/2.m3u8" "КАНАЛЫ ПРЕМИУМ.m3u8"
          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/20TV.m3u8" "20TVХАБАРОВСКИЕ.m3u8"
          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/3.m3u8" "ФИЛЬМЫ HD.m3u8"
          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/4.m3u8" "МУЛЬТФИЛЬМЫ.m3u8"
          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/5.m3u8" "сериалы HD.m3u8"
          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/6.m3u8" "4K.m3u8"
          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/7.m3u8" "ФОРСАЖ все части.m3u8"
          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/8.m3u8" "американский пирог все части.m3u8"
          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/9.m3u8" "4к.m3u8"
          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/fil_mobai.m3u8" "fil_mobai.m3u8"
          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/seri_mobai.m3u8" "seri_mobai.m3u8"
          safe_download "https://raw.githubusercontent.com/TomichekTV/Tomichek/main/staray_seria.m3u8" "staray_seria.m3u8"

      - name: Clean all playlists
        run: |
          for file in *.m3u8; do
            python clean_playlist.py "$file" "${file%.*}_clean.m3u8"
          done

      - name: Merge categories
        run: |
          # Телеканалы
          python merge_categories.py "КАНАЛЫ ПРЕМИУМ_clean.m3u8" "20TVХАБАРОВСКИЕ_clean.m3u8" "Телеканалы.m3u8"
          # Фильмы
          python merge_categories.py "ФИЛЬМЫ HD_clean.m3u8" "ФОРСАЖ все части_clean.m3u8" "американский пирог все части_clean.m3u8" "Фильмы.m3u8"
          # Сериалы
          if [ -f "сериалы HD_clean.m3u8" ]; then
            cp "сериалы HD_clean.m3u8" "Сериалы.m3u8"
          else
            echo "⚠️ Файл сериалы HD_clean.m3u8 не найден, создаём пустой?"
          fi
          # 4К
          python merge_categories.py "4K_clean.m3u8" "4к_clean.m3u8" "4К.m3u8"
          # Мультфильмы
          if [ -f "МУЛЬТФИЛЬМЫ_clean.m3u8" ]; then
            cp "МУЛЬТФИЛЬМЫ_clean.m3u8" "Мультфильмы.m3u8"
          fi
          # Отдельные файлы (просто переименовываем, убирая _clean)
          for f in fil_mobai seri_mobai staray_seria; do
            if [ -f "${f}_clean.m3u8" ]; then
              mv "${f}_clean.m3u8" "${f}.m3u8"
            fi
          done

      - name: Commit final playlists to repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Телеканалы.m3u8 Фильмы.m3u8 Сериалы.m3u8 4К.m3u8 Мультфильмы.m3u8 fil_mobai.m3u8 seri_mobai.m3u8 staray_seria.m3u8 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update category playlists [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}

      - name: Upload to Yandex Disk
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_DISK_TOKEN }}
        run: python upload.py
